gateway.bind=127.0.0.1
gateway.port=18789
agent.model=default
agent.streaming=true
chat.ui.mode=webview2

# Generative model
chat.localModel.enabled=true
chat.localModel.provider=onnx
chat.localModel.rolloutStage=dev
#chat.localModel.storageRoot=blazeclaw/BlazeClawMfc/models/chat/Qwen3-14B-ONNX
chat.localModel.storageRoot=blazeclaw/BlazeClawMfc/models/chat/Qwen3-0.6B-ONNX
chat.localModel.version=
chat.localModel.modelPath=model.onnx
chat.localModel.modelSha256=
chat.localModel.tokenizerPath=tokenizer.json
chat.localModel.tokenizerSha256=
#chat.localModel.maxTokens=256
chat.localModel.maxTokens=128
chat.localModel.temperature=0.0
chat.localModel.verboseMetrics=true
channel=telegram
channel=discord
