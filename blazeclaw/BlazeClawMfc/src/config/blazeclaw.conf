gateway.bind=127.0.0.1
gateway.port=18789
agent.model=default
agent.streaming=true
chat.ui.mode=webview2
channel=telegram
channel=discord

# Embeddings (Phase 7 rollout template)
embeddings.enabled=true
embeddings.provider=onnx
embeddings.model_path=models/embeddings/Qwen3-14B-ONNX/model.onnx
embeddings.tokenizer_path=models/embeddings/Qwen3-14B-ONNX/tokenizer.json
embeddings.dimension=5120
embeddings.max_sequence_length=256
embeddings.normalize=true
embeddings.execution_mode=sequential
