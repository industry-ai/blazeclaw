# Trust-policy distribution template for federated key rotation
# Fill values before enabling --require-trust-policy.

policy_version=<version>
distribution_id=<distribution-id>
distributed_at=<yyyy-mm-ddThh:mm:ssZ>
federation_scope=<global|region|tenant-group>
active_key_ids=<key-id-1;key-id-2>
revoked_key_ids=<revoked-key-id-optional>
max_distribution_age_days=<days>
