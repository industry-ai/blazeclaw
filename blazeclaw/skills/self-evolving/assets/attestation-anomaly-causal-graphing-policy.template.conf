# Confidence-weighted causal graphing policy template
# Fill values before enabling --require-causal-graphing-policy.

policy_version=<version>
sample_weight=<non-negative-number>
fail_weight=<non-negative-number>
context_weight=<non-negative-number>
edge_persistence_weight=<non-negative-number>
recommendation_threshold=<0-100>
cohort_window=<positive-int>
temporal_decay_rate=<non-negative-number>
explainability_enabled=<true|false>
