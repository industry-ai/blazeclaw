<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BlazeClaw Email Skill Configuration</title>
    <style>
        body {
            font-family: Segoe UI, Arial, sans-serif;
            margin: 24px;
            background: #f8f9fb;
        }

        .card {
            max-width: 780px;
            background: #fff;
            border: 1px solid #e2e6ef;
            border-radius: 10px;
            padding: 20px;
        }

        h2 {
            margin: 0 0 16px 0;
        }

        .row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .field {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            color: #444;
            margin-bottom: 4px;
        }

        input {
            height: 34px;
            border: 1px solid #cfd6e4;
            border-radius: 6px;
            padding: 0 10px;
        }

        .checkbox-row {
            display: flex;
            gap: 20px;
            margin: 8px 0 16px 0;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        button {
            height: 34px;
            min-width: 110px;
            border-radius: 6px;
            border: 1px solid #bec7da;
            background: #fff;
            cursor: pointer;
        }

            button.primary {
                background: #2f6fec;
                border-color: #2f6fec;
                color: #fff;
            }

        #status {
            margin-top: 14px;
            font-size: 13px;
            color: #2a3b68;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>IMAP/SMTP Email Configuration</h2>
        <div class="row">
            <div class="field">
                <label for="serverPreset">Common Email Server</label>
                <select id="serverPreset" style="height:34px;border:1px solid #cfd6e4;border-radius:6px;padding:0 10px;">
                    <option value="">Custom (manual input)</option>
                    <option value="163.com">163.com</option>
                    <option value="vip.163.com">vip.163.com</option>
                    <option value="126.com">126.com</option>
                    <option value="vip.126.com">vip.126.com</option>
                    <option value="188.com">188.com</option>
                    <option value="vip.188.com">vip.188.com</option>
                    <option value="yeah.net">yeah.net</option>
                    <option value="gmail.com">Gmail</option>
                    <option value="outlook.com">Outlook (Office 365)</option>
                    <option value="qq.com">QQ Mail</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label for="smtpHost">SMTP Host</label>
                <input id="smtpHost" placeholder="smtp.example.com" />
            </div>
            <div class="field">
                <label for="smtpPort">SMTP Port</label>
                <input id="smtpPort" value="587" />
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label for="imapHost">IMAP Host</label>
                <input id="imapHost" placeholder="imap.example.com" />
            </div>
            <div class="field">
                <label for="imapPort">IMAP Port</label>
                <input id="imapPort" value="993" />
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label for="email">Email Account</label>
                <input id="email" placeholder="you@example.com" />
            </div>
            <div class="field">
                <label for="password">Password / App Password</label>
                <input id="password" type="password" />
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label for="allowedReadDirs">Allowed Read Dirs</label>
                <input id="allowedReadDirs" value="~/Downloads,~/Documents" />
            </div>
            <div class="field">
                <label for="allowedWriteDirs">Allowed Write Dirs</label>
                <input id="allowedWriteDirs" value="~/Downloads" />
            </div>
        </div>
        <div class="checkbox-row">
            <label><input id="imapTls" type="checkbox" checked /> IMAP TLS</label>
            <label><input id="smtpSecure" type="checkbox" /> SMTP Secure (SSL)</label>
            <label><input id="rejectUnauthorized" type="checkbox" checked /> Reject Unauthorized Cert</label>
        </div>
        <div class="actions">
            <button class="primary" id="saveBtn">Save</button>
            <button id="cancelBtn">Cancel</button>
        </div>
        <div id="status">Ready.</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const serverPresetEl = document.getElementById('serverPreset');

        const commonServers = {
            '163.com': {
                imapHost: 'imap.163.com',
                imapPort: '993',
                smtpHost: 'smtp.163.com',
                smtpPort: '465',
                smtpSecure: true,
                imapTls: true
            },
            'vip.163.com': {
                imapHost: 'imap.vip.163.com',
                imapPort: '993',
                smtpHost: 'smtp.vip.163.com',
                smtpPort: '465',
                smtpSecure: true,
                imapTls: true
            },
            '126.com': {
                imapHost: 'imap.126.com',
                imapPort: '993',
                smtpHost: 'smtp.126.com',
                smtpPort: '465',
                smtpSecure: true,
                imapTls: true
            },
            'vip.126.com': {
                imapHost: 'imap.vip.126.com',
                imapPort: '993',
                smtpHost: 'smtp.vip.126.com',
                smtpPort: '465',
                smtpSecure: true,
                imapTls: true
            },
            '188.com': {
                imapHost: 'imap.188.com',
                imapPort: '993',
                smtpHost: 'smtp.188.com',
                smtpPort: '465',
                smtpSecure: true,
                imapTls: true
            },
            'vip.188.com': {
                imapHost: 'imap.vip.188.com',
                imapPort: '993',
                smtpHost: 'smtp.vip.188.com',
                smtpPort: '465',
                smtpSecure: true,
                imapTls: true
            },
            'yeah.net': {
                imapHost: 'imap.yeah.net',
                imapPort: '993',
                smtpHost: 'smtp.yeah.net',
                smtpPort: '465',
                smtpSecure: true,
                imapTls: true
            },
            'gmail.com': {
                imapHost: 'imap.gmail.com',
                imapPort: '993',
                smtpHost: 'smtp.gmail.com',
                smtpPort: '587',
                smtpSecure: false,
                imapTls: true
            },
            'outlook.com': {
                imapHost: 'outlook.office365.com',
                imapPort: '993',
                smtpHost: 'smtp.office365.com',
                smtpPort: '587',
                smtpSecure: false,
                imapTls: true
            },
            'qq.com': {
                imapHost: 'imap.qq.com',
                imapPort: '993',
                smtpHost: 'smtp.qq.com',
                smtpPort: '587',
                smtpSecure: false,
                imapTls: true
            }
        };

        function setStatus(text) {
            statusEl.textContent = text;
        }

        function postMessage(payload) {
            if (!window.chrome || !window.chrome.webview) {
                setStatus('WebView bridge unavailable.');
                return;
            }
            window.chrome.webview.postMessage(payload);
        }

        function applyServerPreset(key) {
            const preset = commonServers[key];
            if (!preset) {
                return;
            }

            document.getElementById('smtpHost').value = preset.smtpHost;
            document.getElementById('smtpPort').value = preset.smtpPort;
            document.getElementById('imapHost').value = preset.imapHost;
            document.getElementById('imapPort').value = preset.imapPort;
            document.getElementById('smtpSecure').checked = !!preset.smtpSecure;
            document.getElementById('imapTls').checked = !!preset.imapTls;

            setStatus('Applied common server preset: ' + key);
        }

        function collectPayload() {
            return {
                smtpHost: document.getElementById('smtpHost').value.trim(),
                smtpPort: document.getElementById('smtpPort').value.trim(),
                imapHost: document.getElementById('imapHost').value.trim(),
                imapPort: document.getElementById('imapPort').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                allowedReadDirs: document.getElementById('allowedReadDirs').value.trim(),
                allowedWriteDirs: document.getElementById('allowedWriteDirs').value.trim(),
                imapTls: !!document.getElementById('imapTls').checked,
                smtpSecure: !!document.getElementById('smtpSecure').checked,
                rejectUnauthorized: !!document.getElementById('rejectUnauthorized').checked
            };
        }

        function applyLoadedConfig(payload) {
            if (!payload || typeof payload !== 'object') {
                return;
            }

            const assignValue = (id, value) => {
                if (typeof value !== 'string') {
                    return;
                }
                const el = document.getElementById(id);
                if (!el) {
                    return;
                }
                el.value = value;
            };

            const assignBool = (id, value) => {
                if (typeof value !== 'boolean') {
                    return;
                }
                const el = document.getElementById(id);
                if (!el) {
                    return;
                }
                el.checked = value;
            };

            assignValue('smtpHost', payload.smtpHost || '');
            assignValue('smtpPort', payload.smtpPort || '587');
            assignValue('imapHost', payload.imapHost || '');
            assignValue('imapPort', payload.imapPort || '993');
            assignValue('email', payload.email || '');
            assignValue('password', payload.password || '');
            assignValue('allowedReadDirs', payload.allowedReadDirs || '~/Downloads,~/Documents');
            assignValue('allowedWriteDirs', payload.allowedWriteDirs || '~/Downloads');
            assignBool('imapTls', payload.imapTls);
            assignBool('smtpSecure', payload.smtpSecure);
            assignBool('rejectUnauthorized', payload.rejectUnauthorized);

            if (typeof payload.serverPreset === 'string' && payload.serverPreset) {
                serverPresetEl.value = payload.serverPreset;
            }
        }

        document.getElementById('saveBtn').addEventListener('click', () => {
            setStatus('Saving configuration...');
            postMessage({ channel: 'blazeclaw.email.config.save', payload: collectPayload() });
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            postMessage({ channel: 'blazeclaw.email.config.cancel' });
            setStatus('Cancelled.');
        });

        serverPresetEl.addEventListener('change', () => {
            const key = serverPresetEl.value;
            if (!key) {
                setStatus('Custom mode: configure server manually.');
                return;
            }

            applyServerPreset(key);
        });

        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', (e) => {
                const msg = e && e.data ? e.data : null;
                if (!msg || typeof msg !== 'object' || !msg.channel) return;
                if (msg.channel === 'blazeclaw.email.config.saved') {
                    setStatus('Saved: ' + (msg.configPath || '(unknown path)'));
                    return;
                }
                if (msg.channel === 'blazeclaw.email.config.error') {
                    setStatus('Error: ' + (msg.message || 'save failed'));
                    return;
                }
                if (msg.channel === 'blazeclaw.email.config.loaded') {
                    applyLoadedConfig(msg.payload || {});
                    setStatus('Loaded saved configuration.');
                    return;
                }
                if (msg.channel === 'blazeclaw.email.config.load.empty') {
                    setStatus('No saved configuration found yet.');
                    return;
                }
                if (msg.channel === 'blazeclaw.email.config.load.error') {
                    setStatus('Load error: ' + (msg.message || 'failed to load config'));
                }
            });
        }

        postMessage({ channel: 'blazeclaw.email.config.ready' });
    </script>
</body>
</html>
